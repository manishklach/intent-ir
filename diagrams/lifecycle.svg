<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect x="50" y="20" width="300" height="40" rx="20" fill="#e7f5ff" stroke="#228be6" stroke-width="2"/>
  <text x="200" y="45" text-anchor="middle" font-family="Arial" font-size="14">DECLARE_AGENT</text>
  
  <path d="M 200 60 L 200 90" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="50" y="90" width="300" height="40" rx="20" fill="#fff4e6" stroke="#fd7e14" stroke-width="2"/>
  <text x="200" y="115" text-anchor="middle" font-family="Arial" font-size="14">Execution Loop</text>
  
  <path d="M 200 130 L 200 160" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="50" y="160" width="300" height="40" rx="20" fill="#e6fcf5" stroke="#0ca678" stroke-width="2"/>
  <text x="200" y="185" text-anchor="middle" font-family="Arial" font-size="14">COMMIT / FAIL</text>
  
  <path d="M 200 200 L 200 230" stroke="#495057" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="50" y="230" width="300" height="40" rx="20" fill="#f1f3f5" stroke="#495057" stroke-width="2"/>
  <text x="200" y="255" text-anchor="middle" font-family="Arial" font-size="14">HALT</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#495057" />
    </marker>
  </defs>
</svg>
